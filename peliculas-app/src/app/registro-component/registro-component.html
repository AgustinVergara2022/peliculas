<div class="registro-container">
  <div class="overlay"></div>

  <div class="card">
    <h2>Crear cuenta</h2>

    <input type="text"
           placeholder="Usuario"
           [(ngModel)]="username">

    <input type="password"
           placeholder="Contraseña"
           [(ngModel)]="password">

    <button (click)="registrar()">Registrarme</button>

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>
    <p class="exito" *ngIf="successMsg">{{ successMsg }}</p>

    <div class="link">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Iniciar sesión</a>
    </div>
  </div>
</div>
